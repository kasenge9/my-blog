<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Category | Kenya Connect</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container">
    <p><a href="/">← Back to home</a></p>
    <h1 id="title">Category</h1>
    <div id="posts" class="post-grid"></div>
  </main>
  <script>
    const slug = decodeURIComponent(location.pathname.split('/').pop());
    fetch(`/api/category/${slug}`).then(r => r.json()).then(data => {
      document.getElementById('title').textContent = data.category;
      document.getElementById('posts').innerHTML = data.posts.map(post => `
      <article class="post-card">
        <img src="${post.image}" alt="${post.title}" loading="lazy" />
        <div class="post-body"><h3><a href="/post/${post.slug}">${post.title}</a></h3><p>${post.summary}</p></div>
      </article>`).join('') || '<p>No posts in this category.</p>';
    });
  </script>
</body>
</html>
