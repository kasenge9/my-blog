<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kenya Connect Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="site-header" style="position: static; border-radius: 12px; margin-bottom: 1rem">
        <div class="logo">⚙️ <span>Kenya Connect CMS Dashboard</span></div>
        <a href="/" style="text-decoration: none">← Back to site</a>
      </header>

      <section class="content-grid" style="grid-template-columns: 1fr 1fr">
        <section class="sidebar">
          <section>
            <h2>Create Post</h2>
            <form id="post-form" class="admin-form">
              <input name="adminKey" type="password" placeholder="Admin key" required />
              <input name="title" placeholder="Post title" required />
              <textarea name="summary" placeholder="Post summary" required></textarea>
              <input name="author" placeholder="Author name" />
              <input name="image" placeholder="Image URL" />
              <select name="category" required>
                <option value="">Select category</option>
                <option>Culture</option>
                <option>Tech</option>
                <option>Lifestyle</option>
                <option>Education</option>
                <option>Entertainment</option>
              </select>
              <label><input type="checkbox" name="trending" /> Mark as trending</label>
              <label><input type="checkbox" name="published" checked /> Publish now</label>
              <button type="submit">Save Post</button>
            </form>
            <p id="post-message" class="form-message"></p>
          </section>
        </section>

        <section class="sidebar">
          <section>
            <h2>Upload Info Notice</h2>
            <form id="info-form" class="admin-form">
              <input name="adminKey" type="password" placeholder="Admin key" required />
              <input name="title" placeholder="Notice title" required />
              <textarea name="message" placeholder="Notice message" required></textarea>
              <button type="submit">Publish Notice</button>
            </form>
            <p id="info-message" class="form-message"></p>
          </section>
        </section>
      </section>

      <section class="content-grid" style="grid-template-columns: 1fr 1fr; margin-top: 1rem">
        <section class="sidebar">
          <section>
            <h2>AdSense / Ad Slots</h2>
            <form id="ads-form" class="admin-form">
              <input name="adminKey" type="password" placeholder="Admin key" required />
              <textarea name="header" placeholder="Header ad script or embed HTML"></textarea>
              <textarea name="sidebar" placeholder="Sidebar ad script or embed HTML"></textarea>
              <textarea name="inArticle" placeholder="In-article ad script or embed HTML"></textarea>
              <button type="submit">Save Ad Settings</button>
            </form>
            <p id="ads-message" class="form-message"></p>
          </section>
        </section>

        <section class="sidebar">
          <section>
            <h2>Newsletter Management</h2>
            <form id="newsletter-form" class="admin-form">
              <input name="adminKey" type="password" placeholder="Admin key" required />
              <button type="submit">Load Subscribers</button>
            </form>
            <p id="newsletter-message" class="form-message"></p>
            <textarea id="newsletter-export" readonly placeholder="Subscriber emails will appear here"></textarea>
          </section>
        </section>
      </section>
    </main>

    <script src="/admin.js"></script>
  </body>
</html>
