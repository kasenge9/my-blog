<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Kenya Connect</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container" style="max-width:560px;">
    <section class="sidebar"><section>
      <h1>Admin Login</h1>
      <p class="meta">Authorized team members only.</p>
      <form id="login-form" class="admin-form">
        <input name="username" placeholder="Username" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Sign In</button>
      </form>
      <p id="login-message" class="form-message"></p>
      <p><a href="/">Back to website</a></p>
    </section></section>
  </main>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: fd.get('username'), password: fd.get('password')})
      });
      const payload = await res.json();
      const msg = document.getElementById('login-message');
      msg.textContent = payload.message;
      msg.style.color = res.ok ? '#15803D' : '#C8102E';
      if (res.ok) location.href = '/admin.html';
    });
  </script>
</body>
</html>
